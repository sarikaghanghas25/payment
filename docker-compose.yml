services:
  mongo:
    image: mongo:latest
    container_name: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
    networks:
      - payment-network

  payment:
    image: payment
    container_name: pay123
    restart: always
    ports:
      - "8088:8088"
    depends_on:
      - mongo
    networks:
      - payment-network

networks:
  payment-network:
    external: true
